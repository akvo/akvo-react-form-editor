name: Build & Publish

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: |
          sed -i 's/"warn"/"error"/g' .eslintrc.json
          yarn test:lint

      - name: Run prettier check
        run: yarn test:prettier

      - name: Run unit tests
        run: yarn test:unit

      - name: Build
        run: yarn build

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Check version and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          LAST_VERSION=$(npm info 'akvo-react-form-editor' version 2>/dev/null || echo "0.0.0")
          NEW_VERSION=$(echo "${GITHUB_REF_NAME}" | sed "s/v//g")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [[ "$PACKAGE_VERSION" != "$LAST_VERSION" ]]; then
            echo "Publishing version $PACKAGE_VERSION"
            npm publish --access public
          else
            echo "Version $PACKAGE_VERSION already published, skipping"
          fi
